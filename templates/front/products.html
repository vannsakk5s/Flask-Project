<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - AuraStore</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased">

    <!-- Include the Navbar -->
    {% include 'front/share/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-8">
        
        <!-- Page Header -->
        <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">All Products</h1>
                <p class="text-slate-500 mt-2">Showing 1-12 of 36 results</p>
            </div>
            <div class="hidden sm:block">
                <select class="px-4 py-2 rounded-lg border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm font-medium text-slate-700">
                    <option>Sort by: Featured</option>
                    <option>Price: Low to High</option>
                    <option>Price: High to Low</option>
                    <option>Newest Arrivals</option>
                </select>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            
            <!-- Filter Sidebar -->
            <aside class="w-full md:w-64 shrink-0">
                <div class="bg-white/70 backdrop-blur-md p-6 rounded-2xl border border-white/50 shadow-sm sticky top-24">
                    
                    <!-- Categories Filter -->
                    <div class="mb-8">
                        <h3 class="font-bold text-slate-900 mb-4 pb-2 border-b border-slate-100">Categories</h3>
                        <ul class="space-y-3 text-sm text-slate-600">
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300" checked> Electronics</label></li>
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> Wearables</label></li>
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> Audio</label></li>
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> Accessories</label></li>
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> Photography</label></li>
                        </ul>
                    </div>

                    <!-- Price Filter -->
                    <div class="mb-8">
                        <h3 class="font-bold text-slate-900 mb-4 pb-2 border-b border-slate-100">Price Range</h3>
                        <div class="flex items-center gap-2 mb-4">
                            <input type="number" placeholder="Min" class="w-full px-2 py-1.5 text-sm rounded border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                            <span class="text-slate-400">-</span>
                            <input type="number" placeholder="Max" class="w-full px-2 py-1.5 text-sm rounded border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        </div>
                        <button class="w-full py-2 text-sm font-semibold rounded bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors">Apply</button>
                    </div>

                    <!-- Rating Filter -->
                    <div>
                        <h3 class="font-bold text-slate-900 mb-4 pb-2 border-b border-slate-100">Rating</h3>
                        <ul class="space-y-3 text-sm text-slate-600">
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="radio" name="rating" class="text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> 4 Stars & Up</label></li>
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="radio" name="rating" class="text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> 3 Stars & Up</label></li>
                            <li><label class="flex items-center gap-3 cursor-pointer hover:text-indigo-600"><input type="radio" name="rating" class="text-indigo-600 focus:ring-indigo-500 w-4 h-4 border-slate-300"> All Ratings</label></li>
                        </ul>
                    </div>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="flex-1">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    {% for product in topproducts %}
                    <div class="group bg-white/70 backdrop-blur-md border border-white/50 rounded-xl overflow-hidden shadow-sm hover:-translate-y-1 hover:shadow-lg transition-all duration-300 flex flex-col">
                        <a href="/product/{{ product.title }}" class="contents">
                            <img src="{{ product.image }}" alt="{{ product.title }}" class="w-full h-64 object-contain bg-white p-4">
                            <div class="p-5 flex-1 flex flex-col">
                                <h3 class="text-md font-semibold text-slate-900 mb-1">{{ product.title }}</h3>
                                <p class="text-sm text-slate-500 mb-3 line-clamp-2">{{ product.description }}</p>
                            </div>
                        </a>
                        <div class="px-5 pb-5 mt-auto flex items-center justify-between">
                            <span class="text-indigo-600 font-bold text-lg">${{ "%.2f"|format(product.price) }}</span>
                            <a href="/cart?product_id={{ product.id }}" class="p-2 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                                </svg>
                            </a>
                        </div>
                    </div>
                    {% endfor %}

                </div>

                <!-- Pagination -->
                <div class="mt-12 flex justify-center gap-2">
                    <button class="w-10 h-10 rounded-lg flex items-center justify-center border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <button class="w-10 h-10 rounded-lg flex items-center justify-center bg-indigo-600 text-white font-semibold">1</button>
                    <button class="w-10 h-10 rounded-lg flex items-center justify-center border border-slate-200 text-slate-700 hover:bg-slate-50 hover:text-indigo-600 font-semibold transition-colors">2</button>
                    <button class="w-10 h-10 rounded-lg flex items-center justify-center border border-slate-200 text-slate-700 hover:bg-slate-50 hover:text-indigo-600 font-semibold transition-colors">3</button>
                    <button class="w-10 h-10 rounded-lg flex items-center justify-center border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Include the Footer -->
    {% include 'front/share/footer.html' %}

</body>

</html>
