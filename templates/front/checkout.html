<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AuraStore</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased">

    <!-- Include the Navbar -->
    {% include 'front/share/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-8">Checkout</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Checkout Form -->
            <div class="lg:col-span-2 bg-white/70 backdrop-blur-md rounded-2xl p-8 border border-white/50 shadow-sm">
                <form>
                    <h3 class="text-2xl font-bold text-slate-900 mb-6 pb-2 border-b border-slate-200">Shipping Information</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2" for="firstName">First Name</label>
                            <input type="text" id="firstName" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2" for="lastName">Last Name</label>
                            <input type="text" id="lastName" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-2" for="address">Address</label>
                        <input type="text" id="address" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2" for="city">City</label>
                            <input type="text" id="city" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2" for="zip">Zip Code</label>
                            <input type="text" id="zip" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                        </div>
                    </div>

                    <h3 class="text-2xl font-bold text-slate-900 mb-6 pb-2 border-b border-slate-200">Payment Details</h3>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-2" for="cardName">Name on Card</label>
                        <input type="text" id="cardName" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-2" for="cardNumber">Card Number</label>
                        <input type="text" id="cardNumber" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="0000 0000 0000 0000" required>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2" for="exp">Expiration (MM/YY)</label>
                            <input type="text" id="exp" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="MM/YY" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2" for="cvv">CVV</label>
                            <input type="text" id="cvv" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" required>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 h-fit">
                <h3 class="text-xl font-bold text-slate-900 mb-6">Order Summary</h3>
                
                <div class="flex items-center gap-4 pb-6 mb-6 border-b border-slate-200">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=100" alt="Product" class="w-12 h-12 object-cover rounded-md bg-slate-200">
                    <div class="flex-1">
                        <h4 class="text-sm font-semibold text-slate-900">Premium Smart Watch (x1)</h4>
                        <div class="text-sm font-bold text-slate-700">$299.00</div>
                    </div>
                </div>
                
                <div class="flex justify-between mb-4 text-slate-600">
                    <span>Subtotal</span>
                    <span class="font-semibold text-slate-900">$299.00</span>
                </div>
                <div class="flex justify-between mb-6 text-slate-600">
                    <span>Shipping</span>
                    <span class="font-semibold text-slate-900">$15.00</span>
                </div>
                <div class="flex justify-between pt-6 border-t border-slate-200">
                    <span class="text-lg font-bold text-slate-900">Total</span>
                    <span class="text-xl font-bold text-indigo-600">$314.00</span>
                </div>
                
                <button class="w-full mt-8 py-4 px-6 text-lg font-semibold rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-600/30 transition-all duration-300">
                    Place Order
                </button>
            </div>
        </div>
    </main>

    <!-- Include the Footer -->
    {% include 'front/share/footer.html' %}

</body>

</html>
