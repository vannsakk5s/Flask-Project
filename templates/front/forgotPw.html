<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AuraStore</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased">

    <!-- Include the Navbar -->
    {% include 'front/share/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-8">
        <div class="max-w-md mx-auto mt-16 p-8 bg-white/70 backdrop-blur-md rounded-2xl border border-white/50 shadow-md">
            <h2 class="text-3xl font-extrabold text-center text-slate-900 mb-4">Reset Password</h2>
            <p class="text-center text-slate-500 mb-8">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form>
                <div class="mb-8">
                    <label class="block text-sm font-medium text-slate-700 mb-2" for="email">Email Address</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="you@example.com" required>
                </div>
                
                <button type="submit" class="w-full py-3 px-4 font-semibold rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300">
                    Send Reset Link
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-slate-600">
                Remembered your password? <a href="/login" class="font-semibold text-indigo-600 hover:text-indigo-700">Back to Sign in</a>
            </div>
        </div>
    </main>

    <!-- Include the Footer -->
    {% include 'front/share/footer.html' %}

</body>

</html>
